<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neonparty Pakking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            pink: '#ff2d95',
                            blue: '#00d4ff',
                            green: '#39ff14',
                            yellow: '#fff01f',
                            purple: '#b026ff',
                        },
                        dark: {
                            900: '#0a0a0f',
                            800: '#12121a',
                            700: '#1a1a25',
                            600: '#222230',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen">
    <div id="app" class="flex flex-col min-h-screen">
        <!-- Header -->
        <header class="bg-dark-800 border-b border-dark-600 px-4 py-3 flex items-center justify-between sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-neon-pink to-neon-blue flex items-center justify-center font-bold text-sm">NP</div>
                <h1 class="text-lg font-bold bg-gradient-to-r from-neon-pink to-neon-blue bg-clip-text text-transparent">Neonparty Pakking</h1>
            </div>
            <div class="flex items-center gap-2">
                <a href="register.html" target="_blank" class="p-2 rounded-lg bg-neon-green/20 hover:bg-neon-green/30 transition-colors border border-neon-green/30" title="Registreringsskjema">
                    <svg class="w-5 h-5 text-neon-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                </a>
                <button id="btn-scanner-quick" class="p-2 rounded-lg bg-dark-700 hover:bg-dark-600 transition-colors" title="Hurtigskann">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 pb-20 overflow-y-auto">
            <!-- Dashboard View -->
            <div id="view-dashboard" class="view p-4 space-y-4">
                <h2 class="text-xl font-bold mb-4">Dashboard</h2>
                <div id="dashboard-service-alert" class="hidden bg-neon-yellow/10 border border-neon-yellow/30 rounded-xl p-3 cursor-pointer hover:bg-neon-yellow/15 transition-colors" onclick="showView('service')">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-neon-yellow shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span class="text-sm text-neon-yellow font-medium" id="dashboard-service-text"></span>
                    </div>
                </div>
                <!-- Active user indicator -->
                <div id="dashboard-user-indicator" class="hidden bg-dark-800 rounded-xl p-3 border border-neon-blue/30 cursor-pointer hover:bg-dark-700 transition-colors" onclick="showView('crew')"></div>

                <!-- New inquiry alert -->
                <div id="dashboard-inquiry-alert" class="hidden bg-neon-yellow/10 border border-neon-yellow/30 rounded-xl p-3 cursor-pointer hover:bg-neon-yellow/15 transition-colors" onclick="App.salesTab='inquiries'; showView('sales')">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-neon-yellow shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                        <span class="text-sm text-neon-yellow font-medium" id="dashboard-inquiry-text"></span>
                    </div>
                </div>

                <!-- Active event alert -->
                <div id="dashboard-event-alert" class="hidden bg-neon-green/10 border border-neon-green/30 rounded-xl p-3 cursor-pointer hover:bg-neon-green/15 transition-colors" onclick="showView('events')">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-neon-green shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <span class="text-sm text-neon-green font-medium" id="dashboard-event-text"></span>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div class="stat-card bg-dark-800 rounded-xl p-4 border border-dark-600 cursor-pointer" onclick="showView('packing')">
                        <div class="text-2xl font-bold text-neon-blue" id="stat-products">0</div>
                        <div class="text-sm text-gray-400">Produkter</div>
                    </div>
                    <div class="stat-card bg-dark-800 rounded-xl p-4 border border-dark-600 cursor-pointer" onclick="showView('events')">
                        <div class="text-2xl font-bold text-neon-green" id="stat-events">0</div>
                        <div class="text-sm text-gray-400">Events</div>
                    </div>
                    <div class="stat-card bg-dark-800 rounded-xl p-4 border border-dark-600 cursor-pointer" onclick="showView('crew')">
                        <div class="text-2xl font-bold text-neon-purple" id="stat-crew">0</div>
                        <div class="text-sm text-gray-400">Crew</div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="stat-card bg-dark-800 rounded-xl p-4 border border-dark-600 cursor-pointer" onclick="showView('sales')">
                        <div class="text-2xl font-bold text-neon-yellow" id="stat-contracts">0</div>
                        <div class="text-sm text-gray-400">Salg</div>
                    </div>
                    <div class="stat-card bg-dark-800 rounded-xl p-4 border border-dark-600 cursor-pointer" onclick="showView('vehicle')">
                        <div class="text-2xl font-bold text-neon-pink" id="stat-vehicle">0</div>
                        <div class="text-sm text-gray-400">I bilen</div>
                    </div>
                    <div class="stat-card bg-dark-800 rounded-xl p-4 border border-dark-600 cursor-pointer" onclick="showView('service')">
                        <div class="text-2xl font-bold text-neon-yellow" id="stat-issues">0</div>
                        <div class="text-sm text-gray-400">Åpne feil</div>
                    </div>
                </div>

                <div class="bg-dark-800 rounded-xl p-4 border border-dark-600">
                    <h3 class="font-semibold mb-3 text-gray-300">Siste aktivitet</h3>
                    <div id="activity-log" class="space-y-2 text-sm text-gray-400">
                        <p class="italic">Ingen aktivitet ennå</p>
                    </div>
                </div>
            </div>

            <!-- Packing View (combined Products, Lists, Boxes) -->
            <div id="view-packing" class="view hidden p-4 space-y-4">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-xl font-bold">Pakking</h2>
                </div>
                <div class="flex gap-1 bg-dark-800 rounded-xl p-1 border border-dark-600">
                    <button class="packing-tab flex-1 py-2 text-sm rounded-lg font-medium transition-colors active" data-packing-tab="products">Produkter</button>
                    <button class="packing-tab flex-1 py-2 text-sm rounded-lg font-medium transition-colors" data-packing-tab="lists">Lister</button>
                    <button class="packing-tab flex-1 py-2 text-sm rounded-lg font-medium transition-colors" data-packing-tab="boxes">Bokser</button>
                </div>
                <!-- Products sub-tab -->
                <div id="packing-tab-products" class="packing-tab-content space-y-4">
                    <div class="flex items-center justify-between">
                        <div class="relative flex-1 mr-3">
                            <input type="text" id="search-products" placeholder="Søk produkter..." class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2 text-sm focus:border-neon-blue focus:outline-none">
                        </div>
                        <button id="btn-add-product" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap">+ Nytt</button>
                    </div>
                    <div id="products-list" class="space-y-3"></div>
                </div>
                <!-- Lists sub-tab -->
                <div id="packing-tab-lists" class="packing-tab-content hidden space-y-4">
                    <div class="flex items-center justify-end">
                        <button id="btn-add-list" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold">+ Ny liste</button>
                    </div>
                    <div id="packing-lists" class="space-y-3"></div>
                </div>
                <!-- Boxes sub-tab -->
                <div id="packing-tab-boxes" class="packing-tab-content hidden space-y-4">
                    <div class="flex items-center justify-end">
                        <button id="btn-add-box" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold">+ Ny boks</button>
                    </div>
                    <div id="boxes-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- Packing List Detail View -->
            <div id="view-list-detail" class="view hidden p-4 space-y-4">
                <button id="btn-back-lists" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold" id="list-detail-name"></h2>
                        <p class="text-sm text-gray-400" id="list-detail-job"></p>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-add-list-item" class="btn-neon px-3 py-1.5 rounded-lg text-sm">+ Produkt</button>
                        <button id="btn-pack-box" class="px-3 py-1.5 rounded-lg text-sm bg-neon-yellow/20 text-neon-yellow border border-neon-yellow/30 hover:bg-neon-yellow/30 transition-colors">Pakk boks</button>
                    </div>
                </div>
                <div class="flex gap-2 text-sm">
                    <span class="px-2 py-1 rounded bg-dark-700 text-gray-300" id="list-detail-progress"></span>
                    <span class="px-2 py-1 rounded bg-dark-700 text-gray-300" id="list-detail-date"></span>
                </div>
                <div id="list-items" class="space-y-2"></div>
            </div>

            <!-- Box Detail View -->
            <div id="view-box-detail" class="view hidden p-4 space-y-4">
                <button id="btn-back-boxes" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold" id="box-detail-name"></h2>
                    <div class="flex gap-2">
                        <button id="btn-add-box-item" class="btn-neon px-3 py-1.5 rounded-lg text-sm">+ Produkt</button>
                        <button id="btn-print-box-label" class="px-3 py-1.5 rounded-lg text-sm bg-neon-purple/20 text-neon-purple border border-neon-purple/30 hover:bg-neon-purple/30 transition-colors">Skriv ut etikett</button>
                    </div>
                </div>
                <div id="box-items" class="space-y-2"></div>
            </div>

            <!-- Events View -->
            <div id="view-events" class="view hidden p-4 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">Arrangementer</h2>
                    <button id="btn-add-event" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold">+ Nytt</button>
                </div>
                <div id="events-list" class="space-y-4"></div>
            </div>

            <!-- Event Detail View -->
            <div id="view-event-detail" class="view hidden p-4 space-y-4">
                <button id="btn-back-events" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="event-detail-content" class="space-y-4"></div>
            </div>

            <!-- Check-in View -->
            <div id="view-checkin" class="view hidden p-4 space-y-4">
                <button id="btn-back-checkin" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="checkin-content" class="space-y-4"></div>
            </div>

            <!-- Crew View -->
            <div id="view-crew" class="view hidden p-4 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">Crew</h2>
                    <button id="btn-add-user" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold">+ Ny bruker</button>
                </div>
                <div id="active-user-indicator" class="bg-dark-800 rounded-xl p-3 border border-neon-blue/30"></div>
                <div id="crew-list" class="space-y-3"></div>
            </div>

            <!-- Vehicle View -->
            <div id="view-vehicle" class="view hidden p-4 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">Biler</h2>
                    <button id="btn-add-vehicle" class="btn-neon px-3 py-1.5 rounded-lg text-sm font-semibold">+ Velg / Ny bil</button>
                </div>
                <div id="vehicle-selector" class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide"></div>
                <div id="vehicle-active-content" class="space-y-4"></div>
            </div>

            <!-- Vehicle Profile View -->
            <div id="view-vehicle-profile" class="view hidden p-4 space-y-4">
                <button id="btn-back-vehicle-profile" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake til biler
                </button>
                <div id="vehicle-profile-content"></div>
            </div>

            <!-- Vehicle Load from List View -->
            <div id="view-vehicle-load" class="view hidden p-4 space-y-4">
                <button id="btn-back-vehicle-load" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake til bil
                </button>
                <div id="vehicle-load-header"></div>
                <div class="bg-dark-800 rounded-xl border border-dark-600 p-3 space-y-2">
                    <div class="flex gap-2">
                        <input type="text" id="vl-barcode" placeholder="Skriv inn eller skann strekkode..." class="flex-1 bg-dark-700 border border-dark-600 rounded-lg px-3 py-2 text-sm focus:border-neon-green focus:outline-none">
                        <button id="btn-vl-scan" class="px-4 py-2 rounded-lg text-sm bg-neon-green text-dark-900 font-semibold hover:bg-neon-green/80 transition-colors">Last inn</button>
                    </div>
                    <div id="vehicle-load-scan-result" class="hidden rounded-lg bg-dark-700"></div>
                </div>
                <div id="vehicle-load-items" class="space-y-2"></div>
            </div>

            <!-- Service View -->
            <div id="view-service" class="view hidden p-4 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">Service</h2>
                    <div class="flex gap-2">
                        <button id="btn-service-scan" class="px-3 py-1.5 rounded-lg text-sm font-semibold bg-neon-blue/20 text-neon-blue border border-neon-blue/30 hover:bg-neon-blue/30 transition-colors">Skann</button>
                        <button id="btn-report-fault" class="btn-neon px-3 py-1.5 rounded-lg text-sm font-semibold">+ Meld feil</button>
                    </div>
                </div>
                <div id="service-list" class="space-y-4"></div>
            </div>

            <!-- Sales View (Forespørsler, Tilbud, Kontrakter, Kunder, Venues) -->
            <div id="view-sales" class="view hidden p-4 space-y-4">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-xl font-bold">Salg</h2>
                </div>
                <div class="flex gap-1 bg-dark-800 rounded-xl p-1 border border-dark-600 overflow-x-auto scrollbar-hide">
                    <button class="sales-tab flex-1 py-2 text-xs rounded-lg font-medium transition-colors whitespace-nowrap px-2 relative" data-sales-tab="inquiries">Forespørsler<span id="inquiry-badge" class="hidden absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-neon-green border-2 border-dark-800"></span></button>
                    <button class="sales-tab flex-1 py-2 text-xs rounded-lg font-medium transition-colors whitespace-nowrap px-2" data-sales-tab="offers">Tilbud</button>
                    <button class="sales-tab flex-1 py-2 text-xs rounded-lg font-medium transition-colors whitespace-nowrap px-2 active" data-sales-tab="contracts">Kontrakter</button>
                    <button class="sales-tab flex-1 py-2 text-xs rounded-lg font-medium transition-colors whitespace-nowrap px-2" data-sales-tab="customers">Kunder</button>
                    <button class="sales-tab flex-1 py-2 text-xs rounded-lg font-medium transition-colors whitespace-nowrap px-2" data-sales-tab="venues">Venues</button>
                </div>
                <!-- Inquiries sub-tab -->
                <div id="sales-tab-inquiries" class="sales-tab-content hidden space-y-4">
                    <div id="inquiries-list" class="space-y-3"></div>
                </div>
                <!-- Offers sub-tab -->
                <div id="sales-tab-offers" class="sales-tab-content hidden space-y-4">
                    <div class="flex items-center justify-end">
                        <button onclick="showNewOfferForm()" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold">+ Nytt tilbud</button>
                    </div>
                    <div id="offers-list" class="space-y-3"></div>
                </div>
                <!-- Contracts sub-tab -->
                <div id="sales-tab-contracts" class="sales-tab-content space-y-4">
                    <div class="flex items-center justify-end">
                        <button id="btn-add-contract" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold">+ Ny kontrakt</button>
                    </div>
                    <div id="contracts-list" class="space-y-3"></div>
                </div>
                <!-- Customers sub-tab -->
                <div id="sales-tab-customers" class="sales-tab-content hidden space-y-4">
                    <div class="flex items-center justify-end">
                        <button id="btn-add-customer" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold">+ Ny kunde</button>
                    </div>
                    <div id="customers-list" class="space-y-3"></div>
                </div>
                <!-- Venues sub-tab -->
                <div id="sales-tab-venues" class="sales-tab-content hidden space-y-4">
                    <div class="flex items-center justify-end">
                        <button id="btn-add-venue" class="btn-neon px-4 py-2 rounded-lg text-sm font-semibold">+ Ny venue</button>
                    </div>
                    <div id="venues-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- Inquiry Detail View -->
            <div id="view-inquiry-detail" class="view hidden p-4 space-y-4">
                <button id="btn-back-inquiries" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="inquiry-detail-content" class="space-y-4"></div>
            </div>

            <!-- Offer Editor View -->
            <div id="view-offer-editor" class="view hidden p-4 space-y-4">
                <button id="btn-back-offers" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="offer-editor-content" class="space-y-4"></div>
            </div>

            <!-- Offer Preview View -->
            <div id="view-offer-preview" class="view hidden p-4 space-y-4">
                <button id="btn-back-offer-detail" class="text-neon-blue text-sm flex items-center gap-1 mb-2 no-print">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="offer-preview-content" class="space-y-4"></div>
            </div>

            <!-- Customer Detail View -->
            <div id="view-customer-detail" class="view hidden p-4 space-y-4">
                <button id="btn-back-customers" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="customer-detail-content" class="space-y-4"></div>
            </div>

            <!-- Venue Detail View -->
            <div id="view-venue-detail" class="view hidden p-4 space-y-4">
                <button id="btn-back-venues" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="venue-detail-content" class="space-y-4"></div>
            </div>

            <!-- Contract Detail View -->
            <div id="view-contract-detail" class="view hidden p-4 space-y-4">
                <button id="btn-back-contracts" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="contract-detail-content" class="space-y-3"></div>
            </div>

            <!-- Contract Preview View -->
            <div id="view-contract-preview" class="view hidden p-4 space-y-4">
                <button id="btn-back-contract-detail" class="text-neon-blue text-sm flex items-center gap-1 mb-2 no-print">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake
                </button>
                <div id="contract-preview-content" class="space-y-4"></div>
            </div>

            <!-- Vehicle Trip View -->
            <div id="view-vehicle-trip" class="view hidden p-4 space-y-4">
                <button id="btn-back-vehicle-trip" class="text-neon-blue text-sm flex items-center gap-1 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Tilbake til bil
                </button>
                <div id="vehicle-trip-content" class="space-y-3"></div>
            </div>

            <!-- Scanner View -->
            <div id="view-scanner" class="view hidden p-4 space-y-4">
                <h2 class="text-xl font-bold">Skanner</h2>
                <div id="scanner-context" class="bg-dark-800 rounded-xl p-3 border border-dark-600 text-sm text-gray-300"></div>
                <div class="bg-dark-800 rounded-xl border border-dark-600 overflow-hidden">
                    <div id="scanner-camera" class="w-full aspect-video bg-dark-700 flex items-center justify-center">
                        <video id="scanner-video" class="w-full h-full object-cover hidden"></video>
                        <div id="scanner-placeholder" class="text-center p-4">
                            <svg class="w-12 h-12 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            <p class="text-gray-500 text-sm">Kamera ikke startet</p>
                        </div>
                    </div>
                    <div class="p-3 flex gap-2">
                        <button id="btn-start-camera" class="flex-1 py-2 rounded-lg text-sm bg-neon-blue/20 text-neon-blue border border-neon-blue/30 hover:bg-neon-blue/30 transition-colors">Start kamera</button>
                        <button id="btn-stop-camera" class="flex-1 py-2 rounded-lg text-sm bg-dark-700 text-gray-400 border border-dark-600 hover:bg-dark-600 transition-colors hidden">Stopp kamera</button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="manual-barcode" placeholder="Skriv inn strekkode manuelt..." class="flex-1 bg-dark-700 border border-dark-600 rounded-lg px-4 py-2 text-sm focus:border-neon-blue focus:outline-none">
                    <button id="btn-manual-scan" class="px-4 py-2 rounded-lg text-sm bg-neon-blue text-dark-900 font-semibold hover:bg-neon-blue/80 transition-colors">Søk</button>
                </div>
                <div id="scanner-result" class="hidden bg-dark-800 rounded-xl p-4 border border-dark-600"></div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 bg-dark-800 border-t border-dark-600 z-40">
            <div class="flex justify-around">
                <button class="nav-btn active flex flex-col items-center py-2 px-1.5 text-xs" data-view="dashboard">
                    <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Hjem
                </button>
                <button class="nav-btn flex flex-col items-center py-2 px-1.5 text-xs" data-view="packing">
                    <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                    Pakking
                </button>
                <button class="nav-btn flex flex-col items-center py-2 px-1.5 text-xs" data-view="vehicle">
                    <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 17h.01M16 17h.01M3 11l1.5-5A2 2 0 016.4 4h11.2a2 2 0 011.9 1.4L21 11M3 11h18M3 11v6a1 1 0 001 1h1m14 0h1a1 1 0 001-1v-6"/></svg>
                    Bil
                </button>
                <button class="nav-btn flex flex-col items-center py-2 px-1.5 text-xs relative" data-view="events">
                    <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    Event
                    <span id="event-badge" class="hidden absolute top-0.5 right-0.5 w-2.5 h-2.5 rounded-full bg-neon-green border-2 border-dark-800"></span>
                </button>
                <button class="nav-btn flex flex-col items-center py-2 px-1.5 text-xs" data-view="crew">
                    <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Crew
                </button>
                <button class="nav-btn flex flex-col items-center py-2 px-1.5 text-xs" data-view="sales">
                    <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Salg
                </button>
                <button class="nav-btn flex flex-col items-center py-2 px-1.5 text-xs relative" data-view="service">
                    <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Service
                    <span id="service-badge" class="hidden absolute top-0.5 right-0.5 w-2.5 h-2.5 rounded-full bg-neon-yellow border-2 border-dark-800"></span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center">
        <div id="modal-content" class="bg-dark-800 w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto border border-dark-600">
            <div class="sticky top-0 bg-dark-800 p-4 border-b border-dark-600 flex items-center justify-between z-10">
                <h3 id="modal-title" class="font-bold text-lg"></h3>
                <button id="modal-close" class="p-1 rounded-lg hover:bg-dark-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="modal-body" class="p-4"></div>
        </div>
    </div>

    <!-- Print Template (hidden, used for printing) -->
    <div id="print-area" class="hidden print:block"></div>

    <script src="js/db.js"></script>
    <script src="js/photodb.js"></script>
    <script src="js/app.js"></script>
    <script src="js/contracts.js"></script>
</body>
</html>
